name: ferryPilot Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    defaults:
      run:
        working-directory: utils/ferryPilotGo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: utils/ferryPilotGo/go.mod

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          package_dir="dist/ferryPilot-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$package_dir/config"
          output="$package_dir/ferryPilot${{ matrix.ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$output" ./cmd/ferryPilot
          cp config/file_map.json "$package_dir/config/file_map.json"
          tar -czf "dist/ferryPilot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" -C dist "ferryPilot-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: utils/ferryPilotGo/dist/ferryPilot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
